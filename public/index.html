
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOSDAQ 히트맵</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#fff;color:#222;font-size:12px}
#wrap{padding:14px}
h1{font-size:20px;font-weight:700;margin-bottom:2px;color:#111}
.desc-btn{font-size:11px;color:#666;margin-bottom:10px;cursor:pointer;user-select:none}
.desc-body{display:none;font-size:11px;color:#555;margin-bottom:10px;line-height:1.7;background:#f9f9f9;padding:8px 12px;border-radius:4px;border:1px solid #e8e8e8}
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.tab-grp{display:flex;border:1px solid #ddd;border-radius:4px;overflow:hidden}
.tab{padding:5px 14px;background:#fff;font-size:12px;cursor:pointer;color:#555;border:none;border-right:1px solid #ddd}
.tab:last-child{border-right:none}
.tab.on{background:#1a3a6b;color:#fff}
select{padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;color:#333}
.search{padding:4px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;width:150px;color:#333}
.rf{padding:5px 12px;border:1px solid #ddd;border-radius:4px;background:#fff;font-size:12px;cursor:pointer;color:#333;margin-left:auto}
.rf:hover{background:#f5f5f5}
.rf:disabled{opacity:.4;cursor:not-allowed}
.lgd{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.lgd-bar{width:120px;height:9px;border-radius:2px;background:linear-gradient(to right,#1565c0,#4a90d9,#bdbdbd,#e57373,#b71c1c)}
.info-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:11px;color:#888}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#ccc;margin-right:4px;vertical-align:middle}
.dot.live{background:#43a047;animation:blink 1.8s infinite}
.dot.err{background:#e53935}
.dot.ld{background:#fb8c00;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#errbox{background:#fff8e1;border:1px solid #ffe082;border-radius:4px;padding:6px 10px;font-size:11px;color:#e65100;margin-bottom:6px;display:none}

/* 히트맵 */
#map-wrap{width:100%;position:relative;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;background:#fff}
#map-svg{width:100%;display:block}
.cell-rect{cursor:pointer}
.cell-rect:hover{filter:brightness(1.13)}

/* 팝업 툴팁 */
#tooltip{
  position:fixed;
  display:none;
  background:#fff;
  border:1px solid #ddd;
  border-radius:6px;
  padding:12px 16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
  z-index:9999;
  min-width:200px;
  pointer-events:none;
}
#tooltip .tt-name{font-size:15px;font-weight:700;color:#111;margin-bottom:2px}
#tooltip .tt-code{font-size:11px;color:#888;margin-bottom:8px}
#tooltip .tt-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
#tooltip .tt-label{color:#888}
#tooltip .tt-val{font-weight:500;color:#111}
#tooltip .tt-chg-pos{font-weight:700;color:#c62828}
#tooltip .tt-chg-neg{font-weight:700;color:#1565c0}
#tooltip .tt-chg-zero{font-weight:700;color:#666}

#footer{margin-top:8px;font-size:11px;color:#999;display:flex;align-items:center;gap:16px}
</style>
</head>
<body>
<div id="wrap">
<h1>KOSDAQ 히트맵</h1>
<div class="desc-btn" onclick="toggleDesc(this)">▶ 설명</div>
<div class="desc-body" id="descBody">
  Yahoo Finance 기준 코스닥 실시간 시세 히트맵입니다.<br>
  빨강 = 상승 &nbsp;|&nbsp; 파랑 = 하락 &nbsp;|&nbsp; 셀 크기 = 시가총액 비례<br>
  데이터는 약 15~20분 지연되며 3분마다 자동 갱신됩니다.
</div>

<div class="toolbar">
  <div class="tab-grp">
    <button class="tab" onclick="setN(50,this)">상위 50</button>
    <button class="tab on" onclick="setN(100,this)">상위 100</button>
  </div>
  <select onchange="setSec(this.value)">
    <option value="">전체 업종</option>
    <option value="이차전지">이차전지</option>
    <option value="바이오">바이오</option>
    <option value="게임">게임</option>
    <option value="엔터">엔터</option>
    <option value="반도체">반도체</option>
    <option value="핀테크">핀테크</option>
    <option value="미디어">미디어</option>
    <option value="통신장비">통신장비</option>
  </select>
  <input class="search" type="text" placeholder="🔍 종목 검색..." oninput="doSearch(this.value)">
  <button class="rf" id="rfBtn" onclick="loadAll()">↻ 새로고침</button>
  <div class="lgd"><span>-5%</span><div class="lgd-bar"></div><span>+5%</span></div>
</div>

<div class="info-bar">
  <div><span class="dot ld" id="dot"></span><span id="stxt">데이터 불러오는 중...</span></div>
</div>
<div id="errbox"></div>
<div id="map-wrap"><svg id="map-svg"></svg></div>
<div id="footer">
  <span>데이터 출처: Yahoo Finance (Netlify 서버)</span>
  <span>총 <span id="tot">–</span>종목</span>
  <span>약 15~20분 지연</span>
  <span>마지막 업데이트: <span id="lastup">–</span></span>
</div>
</div>

<!-- 툴팁 팝업 -->
<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-code" id="tt-code"></div>
  <div class="tt-row"><span class="tt-label">현재가</span><span class="tt-val" id="tt-price"></span></div>
  <div class="tt-row"><span class="tt-label">등락률</span><span id="tt-chg"></span></div>
  <div class="tt-row"><span class="tt-label">시가총액</span><span class="tt-val" id="tt-cap"></span></div>
  <div class="tt-row"><span class="tt-label">업종</span><span class="tt-val" id="tt-sec"></span></div>
</div>

let limitN=100,secF='',srchQ='';

function toggleDesc(btn){
  const d=document.getElementById('descBody');
  const v=d.style.display==='none';
  d.style.display=v?'block':'none';
  btn.textContent=v?'▼ 설명':'▶ 설명';
}

// 원본과 동일한 색상
function getBg(c){
  if(c>=5)  return'#b71c1c';
  if(c>=3)  return'#e53935';
  if(c>=1)  return'#ef5350';
  if(c>=0)  return'#ef9a9a';
  if(c>=-1) return'#90caf9';
  if(c>=-3) return'#1e88e5';
  if(c>=-5) return'#1565c0';
  return'#0d47a1';
}
function getFg(c){
  if(c>=0&&c<1) return'#7f1010';
  if(c>=-1&&c<0) return'#0a2d6e';
  return'#fff';
}

function setN(n,b){limitN=n;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');draw();}
function setSec(v){secF=v;draw();}
function doSearch(v){srchQ=v.toLowerCase();draw();}

async function fetchOne(ticker){
  try{
    const r=await fetch(`/.netlify/functions/quote?ticker=${ticker}`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return null;
    const j=await r.json();
    if(j.error)return null;
    return{price:j.price,chg:j.chg};
  }catch{return null;}
}

async function loadAll(){
  const btn=document.getElementById('rfBtn');
  const dot=document.getElementById('dot');
  const stxt=document.getElementById('stxt');
  const eb=document.getElementById('errbox');
  btn.disabled=true;dot.className='dot ld';eb.style.display='none';
  const targets=ST.slice(0,limitN);
  let done=0,ok=0;
  const CHUNK=10;
  for(let i=0;i<targets.length;i+=CHUNK){
    const batch=targets.slice(i,i+CHUNK);
    await Promise.all(batch.map(async s=>{
      const r=await fetchOne(s.t);
      if(r){prices[s.t]=r;ok++;}
      done++;
      stxt.textContent=`데이터 불러오는 중... ${done}/${targets.length}`;
    }));
    draw();
  }
  const now=new Date();
  document.getElementById('lastup').textContent=now.toLocaleString('ko-KR');
  document.getElementById('tot').textContent=ok;
  if(ok===0){
    dot.className='dot err';stxt.textContent='시세 불러오기 실패';
    eb.style.display='block';eb.textContent='⚠️ 서버 오류. 새로고침해주세요.';
  }else{
    dot.className='dot live';
    stxt.textContent=`마지막 업데이트: ${now.toLocaleTimeString('ko-KR')}${done-ok>0?' (누락 '+(done-ok)+'개)':''}`;
  }
  btn.disabled=false;
}

// 툴팁
const tooltip=document.getElementById('tooltip');
function showTip(e,d){
  const pd=prices[d.data.t];
  const chg=pd?pd.chg:null;
  const sign=chg!==null&&chg>0?'+':'';
  document.getElementById('tt-name').textContent=d.data.n;
  document.getElementById('tt-code').textContent=d.data.code+' · '+d.data.s;
  document.getElementById('tt-price').textContent=pd?pd.price.toLocaleString('ko-KR')+'원':'–';
  document.getElementById('tt-cap').textContent=d.data.cap||'–';
  document.getElementById('tt-sec').textContent=d.data.s;
  const chgEl=document.getElementById('tt-chg');
  if(chg!==null){
    chgEl.textContent=sign+chg.toFixed(2)+'%';
    chgEl.className=chg>0?'tt-chg-pos':chg<0?'tt-chg-neg':'tt-chg-zero';
  }else{chgEl.textContent='–';chgEl.className='tt-chg-zero';}
  tooltip.style.display='block';
  moveTip(e);
}
function moveTip(e){
  const x=e.clientX+14, y=e.clientY+14;
  const tw=tooltip.offsetWidth, th=tooltip.offsetHeight;
  tooltip.style.left=(x+tw>window.innerWidth?x-tw-28:x)+'px';
  tooltip.style.top=(y+th>window.innerHeight?y-th-28:y)+'px';
}
function hideTip(){tooltip.style.display='none';}

function draw(){
  let list=ST.slice(0,limitN);
  if(secF)list=list.filter(s=>s.s===secF);
  if(srchQ)list=list.filter(s=>s.n.toLowerCase().includes(srchQ));

  const wrap=document.getElementById('map-wrap');
  const W=wrap.clientWidth||900;
  const H=Math.max(480,Math.round(W*0.68));

  const svg=d3.select('#map-svg').attr('viewBox',`0 0 ${W} ${H}`).attr('height',H);
  svg.selectAll('*').remove();

  const root=d3.hierarchy({
    children:Object.entries(
      list.reduce((acc,s)=>{(acc[s.s]=acc[s.s]||[]).push(s);return acc;},{})
    ).map(([sec,items])=>({name:sec,children:items.map(s=>({...s,value:s.w}))}))
  }).sum(d=>d.value||0).sort((a,b)=>b.value-a.value);

  d3.treemap()
    .size([W,H])
    .paddingOuter(2)
    .paddingTop(16)
    .paddingInner(1)
    .round(true)(root);

  // 섹터
  const secs=svg.selectAll('g.sec').data(root.children).join('g').attr('class','sec');
  secs.append('rect')
    .attr('x',d=>d.x0).attr('y',d=>d.y0)
    .attr('width',d=>d.x1-d.x0).attr('height',d=>d.y1-d.y0)
    .attr('fill','#eef0f4').attr('rx',1);
  secs.append('text')
    .attr('x',d=>d.x0+5).attr('y',d=>d.y0+12)
    .attr('font-size',10).attr('font-weight',700)
    .attr('fill','rgba(0,0,0,0.4)')
    .text(d=>d.data.name+' >');

  // 종목
  const leaves=svg.selectAll('g.leaf').data(root.leaves()).join('g').attr('class','leaf');

  leaves.append('rect')
    .attr('class','cell-rect')
    .attr('x',d=>d.x0+1).attr('y',d=>d.y0+1)
    .attr('width',d=>Math.max(0,d.x1-d.x0-2))
    .attr('height',d=>Math.max(0,d.y1-d.y0-2))
    .attr('rx',1)
    .attr('fill',d=>{const pd=prices[d.data.t];return pd?getBg(pd.chg):'#c8d0d8';})
    .on('mousemove',function(e,d){showTip(e,d);})
    .on('mouseleave',hideTip);

  leaves.each(function(d){
    const w=d.x1-d.x0-2, h=d.y1-d.y0-2;
    if(w<28||h<18)return;
    const pd=prices[d.data.t];
    const chg=pd?pd.chg:null;
    const fg=chg!==null?getFg(chg):'#fff';
    const cx=d.x0+1+w/2, cy=d.y0+1+h/2;
    const g=d3.select(this);
    const sign=chg!==null&&chg>0?'+':'';

    // 이름 폰트 크기
    const nfs=Math.min(15,Math.max(8,Math.min(w/5,h/3.5)));
    const cfs=Math.max(7,nfs-2);
    const pfs=Math.max(7,nfs-3);

    if(h>=56&&w>=52){
      // 이름
      g.append('text')
        .attr('x',cx).attr('y',cy-(h>80?14:10))
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('fill',fg).attr('font-size',nfs).attr('font-weight',700)
        .attr('pointer-events','none')
        .text(d.data.n.length>7?d.data.n.slice(0,7)+'…':d.data.n);
      // 등락률
      g.append('text')
        .attr('x',cx).attr('y',cy+(h>80?2:4))
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('fill',fg).attr('font-size',cfs)
        .attr('pointer-events','none')
        .text(chg!==null?sign+chg.toFixed(2)+'%':'–');
      // 가격
      if(h>80&&pd){
        g.append('text')
          .attr('x',cx).attr('y',cy+16)
          .attr('text-anchor','middle').attr('dominant-baseline','central')
          .attr('fill',fg).attr('font-size',pfs).attr('opacity',.85)
          .attr('pointer-events','none')
          .text(pd.price.toLocaleString('ko-KR')+'원');
      }
    }else if(h>=32&&w>=40){
      g.append('text')
        .attr('x',cx).attr('y',cy-7)
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('fill',fg).attr('font-size',Math.min(11,nfs)).attr('font-weight',700)
        .attr('pointer-events','none')
        .text(d.data.n.length>5?d.data.n.slice(0,5)+'…':d.data.n);
      g.append('text')
        .attr('x',cx).attr('y',cy+7)
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('fill',fg).attr('font-size',Math.min(9,cfs))
        .attr('pointer-events','none')
        .text(chg!==null?sign+chg.toFixed(2)+'%':'–');
    }else{
      g.append('text')
        .attr('x',cx).attr('y',cy)
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('fill',fg).attr('font-size',Math.min(9,nfs)).attr('font-weight',700)
        .attr('pointer-events','none')
        .text(d.data.n.length>4?d.data.n.slice(0,4):d.data.n);
    }
  });
}

window.addEventListener('resize',()=>draw());
loadAll();
setInterval(loadAll,3*60*1000);
</script>
</body>
</html>
