<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOSDAQ 히트맵 (실시간)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f5f5f5; color: #111; padding: 20px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 14px; }
  .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .btn:hover:not(.active) { background: #f0f0f0; }
  .search { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; width: 180px; outline: none; }
  .refresh-btn { padding: 6px 14px; border: 1px solid #4caf50; border-radius: 6px; background: #fff; font-size: 13px; cursor: pointer; color: #4caf50; transition: all 0.15s; }
  .refresh-btn:hover { background: #4caf50; color: #fff; }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }
  .legend { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; margin-left: auto; }
  .legend-bar { width: 120px; height: 10px; border-radius: 3px; background: linear-gradient(to right, #1565c0, #64b5f6, #e0e0e0, #ef9a9a, #b71c1c); }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .dot.live { background: #4caf50; animation: pulse 1.5s infinite; }
  .dot.error { background: #f44336; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .heatmap { display: flex; flex-wrap: wrap; gap: 2px; }
  .sector-group { margin-bottom: 10px; width: 100%; }
  .sector-label { font-size: 11px; color: #555; margin-bottom: 4px; font-weight: 700; }
  .sector-cells { display: flex; flex-wrap: wrap; gap: 2px; }
  .cell {
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    padding: 4px 3px;
    overflow: hidden;
  }
  .cell:hover { opacity: 0.82; transform: scale(1.03); }
  .cell.loading-cell { background: #e0e0e0 !important; animation: shimmer 1.2s infinite; }
  @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .cell .name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .cell .change { font-size: 10px; margin-top: 1px; }
  .cell .price { font-size: 9px; margin-top: 1px; opacity: 0.85; white-space: nowrap; }
  .sz-xl { width: 155px; height: 88px; }
  .sz-lg { width: 108px; height: 68px; }
  .sz-md { width: 78px; height: 58px; }
  .sz-sm { width: 60px; height: 50px; }
  .sz-xs { width: 48px; height: 42px; }
  .sz-xl .name { font-size: 14px; }
  .sz-xl .change { font-size: 12px; }
  .sz-lg .name { font-size: 12px; }
  .sz-lg .change { font-size: 11px; }
  .footer { margin-top: 14px; font-size: 11px; color: #aaa; line-height: 1.6; }
  .error-msg { background: #fff3e0; border: 1px solid #ffb74d; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #e65100; margin-bottom: 10px; display: none; }
</style>
</head>

<h1>KOSDAQ 히트맵</h1>
<div class="subtitle" id="update-time">데이터 로딩 중...</div>

<div class="controls">
  <button class="btn active" onclick="setFilter('top100', this)">상위 100</button>
  <button class="btn" onclick="setFilter('top50', this)">상위 50</button>
  <input class="search" type="text" placeholder="🔍 종목 검색..." oninput="filterSearch(this.value)">
  <button class="refresh-btn" id="refreshBtn" onclick="fetchAllPrices()">↻ 새로고침</button>
  <div class="legend">
    <span>-5%</span>
    <div class="legend-bar"></div>
    <span>+5%</span>
  </div>
</div>

<div class="status">
  <div class="dot" id="statusDot"></div>
  <span id="statusText">데이터 불러오는 중...</span>
</div>

<div class="error-msg" id="errorMsg"></div>
<div class="heatmap" id="heatmap"></div>

  ※ Yahoo Finance API 기준 (15~20분 지연) · 코스닥 종목 코드 .KQ 기준<br>

// 가격 데이터 저장소
const priceData = {};
let currentFilter = 'top100';
let searchQuery = '';

function getColor(change) {
  if (change >= 5)  return { bg: '#7f0000', text: '#fff' };
  if (change >= 3)  return { bg: '#b71c1c', text: '#fff' };
  if (change >= 1)  return { bg: '#e53935', text: '#fff' };
  if (change >= 0)  return { bg: '#ef9a9a', text: '#7f1010' };
  if (change >= -1) return { bg: '#e0e0e0', text: '#444' };
  if (change >= -3) return { bg: '#90caf9', text: '#0d3b6e' };
  if (change >= -5) return { bg: '#1976d2', text: '#fff' };
  return { bg: '#0d47a1', text: '#fff' };
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterSearch(q) {
  searchQuery = q.toLowerCase();
  render();
}

// Yahoo Finance API (CORS 프록시 사용)
async function fetchPriceBatch(tickers) {
  const symbols = tickers.join(',');
  // allorigins 프록시로 Yahoo Finance 우회
  const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketPreviousClose`;
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

  const res = await fetch(proxyUrl);
  const json = await res.json();
  const data = JSON.parse(json.contents);

  if (data?.quoteResponse?.result) {
    data.quoteResponse.result.forEach(q => {
      priceData[q.symbol] = {
        price: q.regularMarketPrice,
        change: q.regularMarketChangePercent,
      };
    });
  }
}

async function fetchAllPrices() {
  const btn = document.getElementById('refreshBtn');
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const errorMsg = document.getElementById('errorMsg');

  btn.classList.add('loading');
  btn.textContent = '불러오는 중...';
  dot.className = 'dot';
  statusText.textContent = '시세 불러오는 중...';
  errorMsg.style.display = 'none';

  // 로딩 상태 렌더
  renderLoading();

  try {
    const tickers = stocks.map(s => s.ticker);
    // 20개씩 배치 요청
    const batchSize = 20;
    for (let i = 0; i < tickers.length; i += batchSize) {
      const batch = tickers.slice(i, i + batchSize);
      await fetchPriceBatch(batch);
      render();
    }

    dot.className = 'dot live';
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    statusText.textContent = `마지막 업데이트: ${timeStr} (Yahoo Finance · 15~20분 지연)`;
    document.getElementById('update-time').textContent =
      `데이터 출처: Yahoo Finance  |  총 ${stocks.length}종목  |  ${timeStr} 기준`;

  } catch (e) {
    dot.className = 'dot error';
    statusText.textContent = '불러오기 실패';
    errorMsg.style.display = 'block';
    errorMsg.textContent = `⚠️ 시세 불러오기 실패: ${e.message} — 잠시 후 다시 시도해주세요.`;
  }

  btn.classList.remove('loading');
  btn.textContent = '↻ 새로고침';
}

function renderLoading() {
  const container = document.getElementById('heatmap');
  container.innerHTML = '';
  stocks.slice(0, 20).forEach(s => {
    const cell = document.createElement('div');
    cell.className = `cell sz-${s.size} loading-cell`;
    container.appendChild(cell);
  });
}

function render() {
  const limit = currentFilter === 'top50' ? 50 : stocks.length;
  let data = stocks.slice(0, limit);
  if (searchQuery) {
    data = data.filter(s => s.name.toLowerCase().includes(searchQuery));
  }

  const sectors = {};
  data.forEach(s => {
    if (!sectors[s.sector]) sectors[s.sector] = [];
    sectors[s.sector].push(s);
  });

  const container = document.getElementById('heatmap');
  container.innerHTML = '';

  Object.entries(sectors).forEach(([sector, items]) => {
    const group = document.createElement('div');
    group.className = 'sector-group';

    const label = document.createElement('div');
    label.className = 'sector-label';
    label.textContent = sector + ' >';
    group.appendChild(label);

    const cells = document.createElement('div');
    cells.className = 'sector-cells';

    items.forEach(s => {
      const pd = priceData[s.ticker];
      const change = pd ? pd.change : 0;
      const price = pd ? pd.price.toLocaleString('ko-KR') + '원' : '–';
      const { bg, text } = pd ? getColor(change) : { bg: '#e8e8e8', text: '#999' };

      const cell = document.createElement('div');
      cell.className = `cell sz-${s.size}`;
      cell.style.background = bg;
      cell.style.color = text;

      const sign = change > 0 ? '+' : '';
      cell.innerHTML = `
        <div class="name">${s.name}</div>
        <div class="change">${pd ? sign + change.toFixed(2) + '%' : '–'}</div>
        <div class="price">${price}</div>
      `;
      cell.title = `${s.name} | ${price} | ${pd ? sign + change.toFixed(2) + '%' : '시세 없음'}`;
      cells.appendChild(cell);
    });

    group.appendChild(cells);
    container.appendChild(group);
  });
}

// 최초 로드
fetchAllPrices();

// 3분마다 자동 갱신
setInterval(fetchAllPrices, 3 * 60 * 1000);
</script>

</html>
