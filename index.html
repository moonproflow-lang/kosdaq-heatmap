<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOSDAQ 히트맵</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#fff;color:#000;font-size:12px}
#wrap{padding:16px}
h1{font-size:18px;font-weight:700;margin-bottom:4px}
.desc-btn{font-size:11px;color:#666;margin-bottom:10px;cursor:pointer;user-select:none}
.desc-body{display:none;font-size:11px;color:#555;margin-bottom:10px;line-height:1.7;background:#f9f9f9;padding:8px 12px;border-radius:4px;border:1px solid #e8e8e8}
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;background:#f5f5f5;padding:7px 10px;border-radius:5px;border:1px solid #e0e0e0}
.tab-grp{display:flex;gap:2px}
.tab{padding:4px 10px;border:1px solid #bbb;border-radius:3px;background:#fff;font-size:11px;cursor:pointer;color:#333}
.tab.on{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
select{padding:3px 6px;border:1px solid #bbb;border-radius:3px;font-size:11px}
.search{padding:3px 8px;border:1px solid #bbb;border-radius:3px;font-size:11px;width:130px}
.rf{padding:4px 10px;border:1px solid #bbb;border-radius:3px;background:#fff;font-size:11px;cursor:pointer;margin-left:auto}
.rf:disabled{opacity:.4;cursor:not-allowed}
.lgd{display:flex;align-items:center;gap:4px;font-size:10px;color:#777}
.lgd-bar{width:90px;height:7px;border-radius:2px;background:linear-gradient(to right,#0d47a1,#5b9bd5,#c8c8c8,#d46060,#b71c1c)}
.info{font-size:10px;color:#888;margin-bottom:6px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ccc;margin-right:4px;vertical-align:middle}
.dot.live{background:#4caf50;animation:blink 1.5s infinite}
.dot.err{background:#e53935}
.dot.ld{background:#ff9800;animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#errbox{background:#fff8e1;border:1px solid #ffe082;border-radius:4px;padding:6px 10px;font-size:11px;color:#e65100;margin-bottom:6px;display:none}
#heatmap{border:1px solid #ddd;border-radius:4px;overflow:hidden}
.sec-row{border-bottom:1px solid #e8e8e8}
.sec-row:last-child{border-bottom:none}
.sec-head{background:#f0f2f5;padding:3px 8px;font-size:10px;font-weight:700;color:#444;border-bottom:1px solid #e4e4e4}
.cells{display:flex;flex-wrap:wrap}
.cell{display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;padding:2px;transition:filter .1s;border-right:1px solid rgba(0,0,0,.06);border-bottom:1px solid rgba(0,0,0,.06)}
.cell:hover{filter:brightness(1.1)}
.nm{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center}
.ch{text-align:center;margin-top:1px}
.pr{text-align:center;margin-top:1px;opacity:.82;white-space:nowrap}
.c1{width:190px;min-height:96px}.c1 .nm{font-size:15px}.c1 .ch{font-size:12px}.c1 .pr{font-size:10px}
.c2{width:134px;min-height:76px}.c2 .nm{font-size:13px}.c2 .ch{font-size:11px}.c2 .pr{font-size:9px}
.c3{width:96px;min-height:62px}.c3 .nm{font-size:11px}.c3 .ch{font-size:10px}.c3 .pr{font-size:9px}
.c4{width:72px;min-height:54px}.c4 .nm{font-size:10px}.c4 .ch{font-size:9px}.c4 .pr{font-size:8px}
.c5{width:56px;min-height:46px}.c5 .nm{font-size:9px}.c5 .ch{font-size:8px}.c5 .pr{font-size:7px}
.c6{width:44px;min-height:38px}.c6 .nm{font-size:8px}.c6 .ch{font-size:7px}.c6 .pr{display:none}
.shimmer{background:linear-gradient(90deg,#ebebeb 25%,#f8f8f8 50%,#ebebeb 75%);background-size:400% 100%;animation:sh 1.2s infinite}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
#footer{margin-top:8px;font-size:10px;color:#aaa;line-height:1.8}
</style>
</head>
<body>
<div id="wrap">
<h1>KOSDAQ 히트맵</h1>
<div class="desc-btn" onclick="toggleDesc(this)">▶ 설명</div>
<div class="desc-body" id="descBody">
  서버를 통해 직접 가져오는 코스닥 실시간 시세 히트맵입니다.<br>
  빨강 = 상승 &nbsp;|&nbsp; 파랑 = 하락 &nbsp;|&nbsp; 셀 크기 = 시가총액 비례<br>
  데이터는 약 15~20분 지연되며 3분마다 자동 갱신됩니다.
</div>
<div class="toolbar">
  <div class="tab-grp">
    <button class="tab" onclick="setN(50,this)">상위 50</button>
    <button class="tab on" onclick="setN(100,this)">상위 100</button>
  </div>
  <select onchange="setSec(this.value)">
    <option value="">전체 업종</option>
    <option value="이차전지">이차전지</option>
    <option value="바이오">바이오</option>
    <option value="게임">게임</option>
    <option value="엔터">엔터</option>
    <option value="반도체">반도체</option>
    <option value="핀테크">핀테크</option>
    <option value="미디어">미디어</option>
    <option value="통신장비">통신장비</option>
  </select>
  <input class="search" type="text" placeholder="종목 검색..." oninput="doSearch(this.value)">
  <button class="rf" id="rfBtn" onclick="loadAll()">↻ 새로고침</button>
  <div class="lgd"><span>-5%</span><div class="lgd-bar"></div><span>+5%</span></div>
</div>
<div class="info"><span class="dot ld" id="dot"></span><span id="stxt">데이터 불러오는 중...</span></div>
<div id="errbox"></div>
<div id="heatmap"></div>
<div id="footer">
  데이터 출처: Yahoo Finance (Netlify 서버) &nbsp;|&nbsp;
  총 <span id="tot">–</span>종목 &nbsp;|&nbsp;
  약 15~20분 지연 &nbsp;|&nbsp;
  마지막 업데이트: <span id="lastup">–</span>
</div>
</div>

  {n:"인텍플러스",t:"064290.KQ",s:"반도체",c:"c6"},
  {n:"엠플러스",t:"259630.KQ",s:"이차전지",c:"c6"},

const prices={};
let limitN=100,secF='',srchQ='';

function toggleDesc(btn){
  const d=document.getElementById('descBody');
  const v=d.style.display==='none';
  d.style.display=v?'block':'none';
  btn.textContent=v?'▼ 설명':'▶ 설명';
}
function col(c){
  if(c>=5)return{bg:'#7b0000',fg:'#fff'};
  if(c>=3)return{bg:'#c62828',fg:'#fff'};
  if(c>=1)return{bg:'#e53935',fg:'#fff'};
  if(c>=0)return{bg:'#ef9a9a',fg:'#5a0000'};
  if(c>=-1)return{bg:'#c8c8c8',fg:'#222'};
  if(c>=-3)return{bg:'#5b9bd5',fg:'#fff'};
  if(c>=-5)return{bg:'#1565c0',fg:'#fff'};
  return{bg:'#0d47a1',fg:'#fff'};
}
function setN(n,b){limitN=n;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();}
function setSec(v){secF=v;render();}
function doSearch(v){srchQ=v.toLowerCase();render();}

// Netlify 함수로 시세 가져오기
async function fetchOne(ticker){
  try{
    const url = BASE
      ? `${BASE}/.netlify/functions/quote?ticker=${ticker}`
      : `/.netlify/functions/quote?ticker=${ticker}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!r.ok) return null;
    const j=await r.json();
    if(j.error) return null;
    return{price:j.price, chg:j.chg};
  }catch{return null;}
}

async function loadAll(){
  const btn=document.getElementById('rfBtn');
  const dot=document.getElementById('dot');
  const stxt=document.getElementById('stxt');
  const eb=document.getElementById('errbox');
  btn.disabled=true;dot.className='dot ld';eb.style.display='none';
  renderSkel();

  const targets=ST.slice(0,limitN);
  let done=0,ok=0;
  const CHUNK=10;
  for(let i=0;i<targets.length;i+=CHUNK){
    const batch=targets.slice(i,i+CHUNK);
    await Promise.all(batch.map(async s=>{
      const r=await fetchOne(s.t);
      if(r){prices[s.t]=r;ok++;}
      done++;
      stxt.textContent=`데이터 불러오는 중... ${done}/${targets.length}`;
    }));
    render();
  }

  const now=new Date();
  document.getElementById('lastup').textContent=now.toLocaleString('ko-KR');
  document.getElementById('tot').textContent=ok;
  if(ok===0){
    dot.className='dot err';
    stxt.textContent='시세 불러오기 실패';
    eb.style.display='block';
    eb.textContent='⚠️ 서버 오류. 잠시 후 새로고침해주세요.';
  } else {
    dot.className='dot live';
    stxt.textContent=`업데이트: ${now.toLocaleTimeString('ko-KR')}${done-ok>0?' (누락 '+(done-ok)+'개)':''}`;
  }
  btn.disabled=false;
}

function renderSkel(){
  const c=document.getElementById('heatmap');c.innerHTML='';
  const row=document.createElement('div');row.className='sec-row';
  const cells=document.createElement('div');cells.className='cells';
  ST.slice(0,12).forEach(s=>{
    const d=document.createElement('div');
    d.className=`cell ${s.c} shimmer`;
    cells.appendChild(d);
  });
  row.appendChild(cells);c.appendChild(row);
}

function render(){
  let list=ST.slice(0,limitN);
  if(secF)list=list.filter(s=>s.s===secF);
  if(srchQ)list=list.filter(s=>s.n.toLowerCase().includes(srchQ));
  const secs={};
  list.forEach(s=>{(secs[s.s]=secs[s.s]||[]).push(s);});
  const c=document.getElementById('heatmap');c.innerHTML='';
  Object.entries(secs).forEach(([sec,items])=>{
    const row=document.createElement('div');row.className='sec-row';
    const head=document.createElement('div');head.className='sec-head';
    head.textContent=sec+' >';
    row.appendChild(head);
    const cells=document.createElement('div');cells.className='cells';
    items.forEach(s=>{
      const pd=prices[s.t];
      const chg=pd?pd.chg:null;
      const {bg,fg}=chg!==null?col(chg):{bg:'#d8d8d8',fg:'#666'};
      const cell=document.createElement('div');
      cell.className=`cell ${s.c}`;
      cell.style.cssText=`background:${bg};color:${fg}`;
      const sign=chg>0?'+':'';
      cell.innerHTML=
        `<div class="nm">${s.n}</div>`+
        `<div class="ch">${chg!==null?sign+chg.toFixed(2)+'%':'–'}</div>`+
        `<div class="pr">${pd?pd.price.toLocaleString('ko-KR')+'원':'–'}</div>`;
      cell.title=`${s.n} | ${pd?pd.price.toLocaleString()+'원':'–'} | ${chg!==null?sign+chg.toFixed(2)+'%':'–'}`;
      cells.appendChild(cell);
    });
    row.appendChild(cells);c.appendChild(row);
  });
}

loadAll();
setInterval(loadAll,3*60*1000);
</script>
</body>
</html>
